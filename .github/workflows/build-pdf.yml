name: Izgradi PDF iz izvjesca

on:
  push:
    paths:
      - "NUX26_TehnickoIzvjesce_16_Kuser_Ostrunic.docx"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  docx-to-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repozitorija
        uses: actions/checkout@v4

      - name: Instaliraj LibreOffice + metricki kompatibilne fontove
        run: |
          sudo add-apt-repository -y multiverse || true
          sudo apt-get update
          sudo apt-get install -y libreoffice fontconfig \
            fonts-crosextra-carlito fonts-crosextra-caladea \
            fonts-dejavu fonts-liberation
          # Pravi Microsoftovi core fontovi (Times New Roman, Courier New) - nije kriticno ako padne
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ttf-mscorefonts-installer || echo "mscorefonts preskocen"

      - name: Mapiraj fontove na metricki kompatibilne (da se lom stranica poklopi s Wordom)
        run: |
          printf '%s\n' \
            '<?xml version="1.0"?>' \
            '<!DOCTYPE fontconfig SYSTEM "fonts.dtd">' \
            '<fontconfig>' \
            '  <match target="pattern"><test name="family"><string>Calibri</string></test><edit name="family" mode="assign" binding="strong"><string>Carlito</string></edit></match>' \
            '  <match target="pattern"><test name="family"><string>Aptos</string></test><edit name="family" mode="assign" binding="strong"><string>Carlito</string></edit></match>' \
            '  <match target="pattern"><test name="family"><string>Cambria</string></test><edit name="family" mode="assign" binding="strong"><string>Caladea</string></edit></match>' \
            '  <match target="pattern"><test name="family"><string>Consolas</string></test><edit name="family" mode="assign" binding="strong"><string>DejaVu Sans Mono</string></edit></match>' \
            '</fontconfig>' | sudo tee /etc/fonts/local.conf > /dev/null
          sudo fc-cache -f

      - name: Pretvori DOCX u PDF (isto ime)
        run: |
          libreoffice --headless -env:UserInstallation=file:///tmp/lo \
            --convert-to pdf --outdir . \
            "NUX26_TehnickoIzvjesce_16_Kuser_Ostrunic.docx"
          ls -la "NUX26_TehnickoIzvjesce_16_Kuser_Ostrunic.pdf"

      - name: Commitaj PDF natrag u repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "NUX26_TehnickoIzvjesce_16_Kuser_Ostrunic.pdf"
          if git diff --staged --quiet; then
            echo "Nema promjene PDF-a, preskačem commit."
          else
            git commit -m "Auto: osvjezen PDF izvjesca [skip ci]"
            git push
          fi
